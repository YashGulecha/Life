version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: life-backend
    restart: always
    volumes:
      - backend-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/life.db
      - JWT_SECRET=change-this-to-a-secure-secret-key-at-runtime
      - PORT=8000
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.life-backend.entrypoints=websecure"
      - "traefik.http.routers.life-backend.priority=2"
      - "traefik.http.routers.life-backend.rule=Host(`life.yashgulecha.in`) && (PathPrefix(`/api`) || PathPrefix(`/static/assets`))"
      - "traefik.http.routers.life-backend.tls=true"
      - "traefik.http.routers.life-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.life-backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: life-frontend
    restart: always
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.life-frontend.entrypoints=websecure"
      - "traefik.http.routers.life-frontend.priority=1"
      - "traefik.http.routers.life-frontend.rule=Host(`life.yashgulecha.in`)"
      - "traefik.http.routers.life-frontend.tls=true"
      - "traefik.http.routers.life-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.life-frontend.loadbalancer.server.port=80"

volumes:
  backend-data:
    driver: local

networks:
  proxy:
    external: true
